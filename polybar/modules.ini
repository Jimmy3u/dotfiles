[module/date]
type = internal/date
time = "%I:%M   "
format = <label>
label = %time%
format-padding = 2
format-foreground = ${colors.foreground}
format-background = ${colors.highlight}
format-font = 2
time-alt = "%A, %d %B %Y    %H:%M:%S  "

[module/title]
type = internal/xwindow
format = <label>
format-foreground = ${colors.foreground}
format-padding = 2
label = %title%
label-empty = ~
label-maxlen = 60

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
icon-0 = 0;0 
icon-1 = 1; 
icon-2 = 2;
icon-3 = 3;
icon-4 = 4; 
icon-5 = 5;5
icon-6 = 6;6
icon-7 = 7;7
icon-8 = 8;8
icon-9 = 9;9
format = <label-state>
format-font = 1
#format-offset = 2px
label-active = %icon%
label-occupied = %icon% 
label-urgent = %icon% 
label-empty = %icon% 
label-active-foreground = ${colors.background}
label-active-background = ${colors.active}
label-occupied-foreground = ${colors.foreground}
label-occupied-background = ${colors.background}
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.primary}
label-empty-foreground = ${colors.foreground}
label-empty-background = ${colors.background}
label-active-padding = 3
label-urgent-padding = 2
label-occupied-padding = 2
label-empty-padding = 2

[module/alsa]
type = internal/alsa
format-volume = <ramp-volume> <bar-volume>
format-volume-padding = 2
format-muted = <label-muted>
format-muted-padding = 2
label-muted = 🔇 muted-
label-muted-foreground = ${colors.inactive}
headphone_control_numid = 4
ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 = 
ramp-volume-3 = 
ramp-volume-foreground = ${colors.foreground}

ramp-headphones-0 = 
ramp-headphones-1 = 

bar-volume-width = 8
bar-volume-indicator = 
bar-volume-indicator-foreground = ${colors.foreground}
bar-volume-fill = -
bar-volume-fill-foreground = ${colors.foreground}
bar-volume-empty = -
bar-volume-empty-foreground = ${colors.inactive}

click-right = pavucontrol
click-middle = audioSwitch

[module/tray]
type = internal/tray
tray-spacing = 1px
tray-padding = 6px
tray-size = 18px
format-background = ${colors.active}
tray-background = ${colors.active}

[module/power]
type = custom/text
format = <label>
format-background = ${colors.error}
label = 
format-padding = 2
click-left = "rofi -show power-menu -modi power-menu:~/.local/bin/rofi-power-menu -theme powerMenu"

[module/redshift]
type = custom/script
format-prefix = " "  
format-background = ${colors.highlight}
format-padding = 2
exec = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh temperature 
click-left = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh toggle 
scroll-up = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh increase
scroll-down = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh decrease
interval=0.2
